name: MCPManager
options:
  bundleIdPrefix: com.mcpmanager
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  MCPManager:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.xcodeproj"
          - MCPManager.entitlements
          - ".build"
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcpmanager.app
        INFOPLIST_FILE: Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: MCPManager.entitlements
        ENABLE_APP_SANDBOX: NO
    info:
      path: Info.plist
      properties:
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSAppleMusicUsageDescription: "This app accesses Apple Music to search the catalog, manage your library, and create playlists on your behalf via MCP tools."
    entitlements:
      path: MCPManager.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.network.server: true
